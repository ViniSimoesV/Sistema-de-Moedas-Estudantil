spring.application.name=UniRewards

# URL de Conexão
spring.datasource.url=jdbc:postgresql://db.logixvrbnxyuklwwouad.supabase.co:5432/postgres?sslmode=require

# Credenciais
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# Hibernate - Forçando o dialeto
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Hikari - Resiliência total
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.maximum-pool-size=5

# O Render define a porta automaticamente
server.port=${PORT:8080}