spring.application.name=UniRewards

# URL de Conexão
spring.datasource.url=jdbc:postgresql://db.logixvrbnxyuklwwouad.supabase.co:5432/postgres?sslmode=require&tcpKeepAlive=true

# Usuário e Senha
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# Configurações do Hibernate/JPA
#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuração de porta (usa variável de ambiente PORT ou 8080 por padrão)
#server.port=${PORT:8080}

# Faz o pool esperar até 30 segundos pela primeira conexão antes de dar erro
spring.datasource.hikari.initialization-fail-timeout=30000
# Define o tempo máximo de espera por uma conexão do pool
spring.datasource.hikari.connection-timeout=30000