spring.application.name=UniRewards

# URL com SSL Obrigatório e KeepAlive para redes instáveis
spring.datasource.url=jdbc:postgresql://db.logixvrbnxyuklwwouad.supabase.co:5432/postgres?sslmode=require&tcpKeepAlive=true&connectTimeout=30
# Credenciais
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# Hibernate - Forçando dialeto para evitar consultas extras de metadados
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# HikariCP - Aumentando a resiliência do pool
#spring.datasource.hikari.connection-timeout=60000
#spring.datasource.hikari.maximum-pool-size=5
#spring.datasource.hikari.max-lifetime=1800000
#spring.datasource.hikari.keepalive-time=30000

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.minimum-idle=1