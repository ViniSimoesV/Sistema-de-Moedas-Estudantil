spring.application.name=UniRewards

# URL com SSL obrigatório e KeepAlive para manter a conexão viva
spring.datasource.url=jdbc:postgresql://db.logixvrbnxyuklwwouad.supabase.co:5432/postgres?sslmode=require&tcpKeepAlive=true

# Credenciais (Certifique-se que DB_PASSWORD no Render está correta)
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# Hibernate - Mantenha o Dialeto fixo para evitar consultas de metadados desnecessárias
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# Hikari - Aumente o tempo de vida para evitar que conexões "velhas" causem o timeout
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# O Render define a porta automaticamente
server.port=${PORT:8080}