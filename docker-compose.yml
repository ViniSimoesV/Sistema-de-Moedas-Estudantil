version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: unirewards-rabbitmq
    ports:
      - "5672:5672"   # Porta de comunicação com o Spring Boot
      - "15672:15672" # Porta do painel de administração (navegador)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped