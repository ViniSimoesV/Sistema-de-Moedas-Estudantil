<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Empresa - UniRewards</title>
    <link rel="icon" href="../assets/Lumen.png" type="image/png">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="stylesheet" href="../css/energia.css">
    <link rel="stylesheet" href="../css/modal.css">
</head>
<body class="perfil-page">

    <canvas id="energyCanvas"></canvas>
    <div id="navbar"></div>

    <main class="perfil-container">
        <!-- Coluna 1: Branding -->
        <aside class="perfil-sidebar">
            <div class="perfil-card glass">
                <div class="avatar-container">
                    <img src="../assets/Lumen.png" alt="Logo Empresa" class="perfil-avatar">
                </div>
                <h3 class="user-name">Tech Solutions</h3>
                
                <div class="lumen-balance">
                    <div class="lumen-values" style="text-align: center;">
                        <span class="lumen-count">452</span>
                        <p class="lumen-label">Cupons Resgatados</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Coluna 2: Informações -->
        <section class="perfil-content">
            <div class="content-card glass">
                <header class="card-header">
                    <h4 class="module-title">Dados Institucionais</h4>
                </header>
                <div class="data-grid">
                    <div class="data-group">
                        <span class="data-label">CNPJ</span>
                        <p class="data-value">00.000.000/0001-00</p>
                    </div>
                    <div class="data-group">
                        <span class="data-label">Ramo de Atuação</span>
                        <p class="data-value ramo-valor">Tecnologia e Educação</p>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn-edit-text">Editar informações</button>
                </div>
            </div>

            <div class="content-card glass">
                <header class="card-header">
                    <h4 class="module-title">Minhas Vantagens</h4>
                </header>
                <div class="module-body centered">
                    <!-- Texto de desempenho removido para simplificar -->
                    <button class="btn btn-confirmar btn-small">Adicionar Nova Vantagem</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal de Edição -->
    <div id="modalEditar" class="modal-overlay">
        <div class="modal-content glass">
            <div class="modal-header">
                <h4 class="module-title">Editar Perfil</h4>
            </div>
            <form id="formEditarPerfil">
                <div class="modal-body">
                    <div class="input-group">
                        <label>Nome Institucional</label>
                        <input type="text" id="editNome" required>
                    </div>
                    <div class="input-group">
                        <label>Ramo de Atuação</label>
                        <input type="text" id="editRamo">
                    </div>
                    <div class="input-group">
                        <label>Foto de Perfil</label>
                        <div class="upload-wrapper" style="display: flex; align-items: center; gap: 1rem;">
                            <input type="file" id="editFotoFile" accept="image/*" style="flex: 1;">
                            <button type="button" id="btnLimparFoto" class="btn-cancelar btn-small" style="display: none;">Remover</button>
                        </div>
                        <small style="color: var(--text-secondary); margin-top: 5px;">Formatos aceitos: JPG, PNG ou WebP.</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancelar" id="btnFecharModal">Cancelar</button>
                    <button type="submit" class="btn btn-confirmar">Salvar Alterações</button>
                </div>

                <div class="input-group danger-zone" style="margin-top: 2rem; border-top: 1px solid rgba(255,0,0,0.2); padding-top: 1rem;">
                    <label style="color: #ff4d4d;">Zona de Perigo</label>
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 10px;">
                        A exclusão da conta é permanente e removerá todos os seus dados.
                    </p>
                    <button type="button" id="btnExcluirConta" class="btn-edit-text" style="border-color: #ff4d4d; color: #ff4d4d;">
                        Excluir Minha Conta
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/perfilEmpresa.js" defer></script>
    <script src="../js/navbarEmpresa.js" defer></script>
    <script src="../js/energia.js" defer></script>
</body>
</html>
