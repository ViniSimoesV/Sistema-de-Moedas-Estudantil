<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - UniRewards</title>
    <link rel="icon" href="../assets/Lumen.png" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    <link rel="stylesheet" href="../css/energia.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="cadastro-page">

    <canvas id="energyCanvas"></canvas>

    <div class="cadastro-container">
        <header class="form-header">
            <a href="../index.html">
                <img src="../assets/Lumen.png" alt="Lúmen" class="form-logo">
            </a>
            <h2>Crie sua conta</h2>
        </header>
        
        <!-- Seletor de Tipo de Usuário -->
        <div class="user-type-selector">
            <button type="button" class="type-btn active" data-type="aluno">Sou Aluno</button>
            <button type="button" class="type-btn" data-type="empresa">Sou Empresa</button>
            <button type="button" class="type-btn" data-type="instituicao">Sou Instituição</button>
        </div>

        <form id="form-cadastro">
            <div class="input-group">
                <input type="text" id="nome" name="nome" placeholder="Nome Completo" required>
            </div>
            <div class="input-group">
                <input type="email" id="email" name="email" placeholder="E-mail Acadêmico" required>
            </div>
            <div class="input-group">
                <input type="text" id="documento" name="documento" placeholder="CPF" required>
            </div>
            <!-- Campo dinâmico para Alunos (selecionar Instituição cadastrada) -->
            <div class="input-group" id="group-vinculo">
                <select id="vinculo" name="instituicao" required>
                    <option value="" disabled selected>Selecione sua Instituição</option>
                    <option value="1">PUC Minas</option>
                </select>
            </div>
            <div class="input-group">
                <input type="password" id="senha" name="senha" placeholder="Sua Senha" required>
            </div>
            
            <button type="submit" class="btn btn-confirmar">Finalizar Cadastro</button>
            <p class="form-footer">Já tem uma conta? <a href="../static/login.html">Entrar</a></p>
        </form>
    </div>

    <script type="module" src="../js/cadastro.js" defer></script>
    <script src="../js/energia.js" defer></script>
</body>
</html>
