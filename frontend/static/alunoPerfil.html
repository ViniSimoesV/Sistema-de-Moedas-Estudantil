<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - UniRewards</title>
    <link rel="icon" href="../assets/Lumen.png" type="image/png">
    
    <!-- Estilos globais e específicos -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/energia.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="perfil-page">

    <canvas id="energyCanvas"></canvas>
    <div id="navbar"></div>

    <main class="perfil-container">
        <!-- Coluna 1: Gamificação e Status (Módulo Esquerdo) -->
        <aside class="perfil-sidebar">
            <div class="perfil-card glass">
                <div class="avatar-container">
                    <img src="../assets/avatar_placeholder.png" alt="Avatar do Aluno" class="perfil-avatar">
                    <span class="level-badge"></span> <!-- Preenchido pelo JS -->
                </div>
                <h3 class="user-name"></h3> <!-- Preenchido pelo JS -->
                <p class="user-rank"></p> <!-- Preenchido pelo JS -->
                
                <div class="lumen-balance">
                    <img src="../assets/Lumen.png" alt="Lúmen" class="wallet-lumen">
                    <div class="lumen-values">
                        <span class="lumen-count"></span> <!-- Preenchido pelo JS -->
                        <p class="lumen-label">Lúmens disponíveis</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Coluna 2: Dados e Histórico -->
        <section class="perfil-content">
            <!-- Módulo Acadêmico -->
            <div class="content-card glass">
                <header class="card-header">
                    <h4 class="module-title">Dados Acadêmicos</h4>
                </header>
                
                <div class="data-grid">
                    <div class="data-group">
                        <span class="data-label">Curso</span>
                        <p class="data-value"></p> <!-- Preenchido pelo JS -->
                    </div>
                    <div class="data-group">
                        <span class="data-label">Instituição</span>
                        <p class="data-value"></p> <!-- Preenchido pelo JS -->
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn-edit-text">Editar informações</button>
                </div>
            </div>

            <!-- Módulo de Endereço -->
            <div class="content-card glass">
                <header class="card-header">
                    <h4 class="module-title">Endereço</h4>
                </header>
                <div id="completar-perfil-area" class="module-body centered">
                    <!-- Conteúdo dinâmico injetado pelo perfilAluno.js -->
                </div>
            </div>
        </section>
    </main>

    <!-- Modal de Edição Acadêmica (Foto e Curso) -->
    <div id="modalEditar" class="modal-overlay">
        <div class="modal-content glass">
            <div class="modal-header">
                <h4 class="module-title">Editar Perfil</h4>
            </div>
            <form id="formEditarPerfil">
                <div class="modal-body">
                    <div class="input-group">
                        <label>Curso</label>
                        <input type="text" id="editCurso" placeholder="Ex: Engenharia de Software">
                    </div>
                    
                    <div class="input-group">
                        <label>Foto de Perfil</label>
                        <div class="upload-wrapper" style="display: flex; align-items: center; gap: 1rem;">
                            <input type="file" id="editFotoFile" accept="image/*" style="flex: 1;">
                        </div>
                        <small style="color: var(--text-secondary); margin-top: 5px;">Formatos aceitos: JPG, PNG ou WebP.</small>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-cancelar" onclick="fecharModal('modalEditar')">Cancelar</button>
                        <button type="submit" class="btn btn-confirmar">Salvar Alterações</button>
                    </div>

                    <!-- Zona de Perigo Identica a da Empresa -->
                    <div class="input-group danger-zone" style="margin-top: 2rem; border-top: 1px solid rgba(255,0,0,0.2); padding-top: 1rem;">
                        <label style="color: #ff4d4d;">Zona de Perigo</label>
                        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 10px;">
                            A exclusão da conta é permanente e removerá todos os seus dados.
                        </p>
                        <button type="button" id="btnExcluirConta" class="btn-edit-text" style="border-color: #ff4d4d; color: #ff4d4d; width: auto;">
                            EXCLUIR MINHA CONTA
                        </button>
                    </div>
                </div>
                
            </form>
        </div>
    </div>

    <!-- Modal de Endereço -->
    <div id="modalEndereco" class="modal-overlay">
        <div class="modal-content glass">
            <div class="modal-header">
                <h4 class="module-title">Endereço de Entrega</h4>
            </div>
            <form id="formEndereco">
                <div class="modal-body">
                    <!-- Grid de duas colunas para Rua e Número -->
                    <div style="display: grid; grid-template-columns: 2.5fr 1fr; gap: 0.8rem; margin-bottom: 1.2rem;">
                        <div class="input-group" style="margin-bottom: 0;">
                            <label>Rua</label>
                            <input type="text" id="editRua" required style="width: 100%;">
                        </div>
                        <div class="input-group" style="margin-bottom: 0;">
                            <label>Nº</label>
                            <input type="number" id="editNumero" required style="width: 100%;">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Complemento</label>
                        <input type="text" id="editComplemento">
                    </div>

                    <!-- Grid de duas colunas para Bairro e Cidade -->
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem;">
                        <div class="input-group" style="margin-bottom: 0;">
                            <label>Bairro</label>
                            <input type="text" id="editBairro" required style="width: 100%;">
                        </div>
                        <div class="input-group" style="margin-bottom: 0;">
                            <label>Cidade</label>
                            <input type="text" id="editCidade" required style="width: 100%;">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancelar" onclick="fecharModal('modalEndereco')">Cancelar</button>
                    <button type="submit" class="btn btn-confirmar">Salvar Endereço</button>
                </div>
            </form>
        </div>
    </div>


    <script type="module" src="../js/perfilAluno.js" defer></script>
    <script src="../js/navbarAluno.js" defer></script>
    <script src="../js/energia.js" defer></script>
</body>
</html>
