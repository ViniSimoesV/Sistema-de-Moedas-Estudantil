<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - UniRewards</title>
    <link rel="icon" href="../assets/Lumen.png" type="image/png">
    
    <!-- Estilos globais e específicos -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/energia.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="perfil-page">

    <!-- Fundo de partículas Lúmen -->
    <canvas id="energyCanvas"></canvas>

    <!-- O navbar.js injetará o cabeçalho aqui automaticamente -->
    <div id="navbar"></div>

    <main class="perfil-container">
        <!-- Coluna 1: Gamificação e Status -->
        <aside class="perfil-sidebar">
            <div class="perfil-card glass">
                <div class="avatar-container">
                    <img src="../assets/avatar_placeholder.png" alt="Avatar do Aluno" class="perfil-avatar">
                    <span class="level-badge">Nível 5</span>
                </div>
                <h3 class="user-name">Vinícius Simões Viana</h3>
                <p class="user-rank">Explorador de Lúmens</p>
                
                <div class="lumen-balance">
                    <img src="../assets/Lumen.png" alt="Lúmen" class="wallet-lumen">
                    <div class="lumen-values">
                        <span class="lumen-count">1.250</span>
                        <p class="lumen-label">Lúmens disponíveis</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Coluna 2: Dados Pessoais e Histórico -->
        <section class="perfil-content">
            <!-- Módulo Acadêmico -->
            <div class="content-card glass">
                <header class="card-header">
                    <h4 class="module-title">Dados Acadêmicos</h4>
                </header>
                
                <div class="data-grid">
                    <div class="data-group">
                        <span class="data-label">Curso</span>
                        <p class="data-value">Engenharia de Software</p>
                    </div>
                    <div class="data-group">
                        <span class="data-label">Instituição</span>
                        <p class="data-value">PUC Minas</p>
                    </div>
                </div>
                <!-- Botão movido para a direita inferior -->
                <div class="card-footer">
                    <button class="btn-edit-text">Editar informações</button>
                </div>
            </div>

            <!-- Módulo de Endereço -->
            <div class="content-card glass">
                <header class="card-header">
                    <h4 class="module-title">Endereço</h4>
                </header>
                <!-- Container com ID para controle de visibilidade -->
                <div id="completar-perfil-area" class="module-body centered">
                    <p class="status-text">Você ainda não cadastrou seu endereço para resgate de prêmios.</p>
                    <button class="btn btn-confirmar btn-small">Completar Perfil</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../js/navbarAluno.js" defer></script>
    <script src="../js/energia.js" defer></script>
</body>
</html>
