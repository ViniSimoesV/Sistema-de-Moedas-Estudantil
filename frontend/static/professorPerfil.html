<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Professor - UniRewards</title>
    <link rel="icon" href="../assets/Lumen.png" type="image/png">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="stylesheet" href="../css/energia.css">
    <link rel="stylesheet" href="../css/modal.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="perfil-page">

    <canvas id="energyCanvas"></canvas>
    <div id="navbar"></div>

    <main class="perfil-container">
        <aside class="perfil-sidebar">
            <div class="perfil-card glass">
                <div class="avatar-container">
                    <img src="../assets/avatar_placeholder.png" alt="Avatar do Professor" class="perfil-avatar">
                </div>
                <h3 class="user-name">Carregando...</h3>
                <p class="user-rank" style="color: var(--lumen-gold); margin-top: 5px;">Corpo Docente</p>
                
                <div class="lumen-balance" style="margin-top: 2rem;">
                    <img src="../assets/Lumen.png" alt="Lúmen" class="wallet-lumen">
                    <div class="lumen-values">
                        <span class="lumen-count" id="saldoLumens">0</span>
                        <p class="lumen-label">Lúmens para Distribuir</p>
                    </div>
                </div>
            </div>
        </aside>

        <section class="perfil-content">
            <div class="content-card glass">
                <header class="card-header">
                    <h4 class="module-title">Dados Acadêmicos</h4>
                </header>
                <div class="data-grid">
                    <div class="data-group">
                        <span class="data-label">Departamento</span>
                        <p class="data-value" id="infoDepartamento">---</p>
                    </div>
                    <div class="data-group">
                        <span class="data-label">E-mail Institucional</span>
                        <p class="data-value" id="infoEmail">---</p>
                    </div>
                    <div class="data-group">
                        <span class="data-label">CPF</span>
                        <p class="data-value" id="infoCpf">---</p>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn-edit-text" id="btnAbrirEdicao">Editar informações</button>
                </div>
            </div>
        </section>
    </main>

    <div id="modalEditar" class="modal-overlay">
        <div class="modal-content glass">
            <div class="modal-header">
                <h4 class="module-title">Editar Perfil</h4>
            </div>
            <form id="formEditarPerfil">
                <div class="modal-body">
                    <div class="input-group">
                        <label>Nome de Exibição</label>
                        <input type="text" id="editNome" required>
                    </div>
                    <div class="input-group">
                        <label>E-mail Institucional</label>
                        <input type="email" id="editEmail" required>
                    </div>
                    <div class="input-group">
                        <label>Foto de Perfil</label>
                        <div class="upload-wrapper" style="display: flex; align-items: center; gap: 1rem;">
                            <input type="file" id="editFotoFile" accept="image/*" style="flex: 1;">
                        </div>
                        <small style="color: var(--text-secondary); margin-top: 5px;">Opcional: Atualize a sua foto de perfil.</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancelar" id="btnFecharModal">Cancelar</button>
                    <button type="submit" class="btn btn-confirmar">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/perfilProfessor.js" defer></script>
    <script src="../js/navbarProfessor.js" defer></script> 
    <script src="../js/energia.js" defer></script>
</body>
</html>
