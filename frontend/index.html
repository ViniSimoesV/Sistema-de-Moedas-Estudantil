<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniRewards</title>
    <link rel="icon" href="./assets/Lumen.png" type="image/png">
    <link rel="stylesheet" href="./css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<body>
    <header class="navbar">
        <div class="logo">Uni<span>Rewards</span></div>

    <main class="hero">

                A plataforma de mérito acadêmico onde professores recompensam seu esforço e empresas oferecem vantagens exclusivas.
            </p>
            
            <div class="button-group">
                <a href="./static/cadastro.html" class="btn btn-confirmar" >Cadastrar</a>
                <a href="./static/login.html" class="btn btn-entrar">Entrar</a>
            </div>
        </div>

        <div class="hero-visual">
            <div class="lumen-container">
                <img src="./assets/lumen.png" alt="Lúmen" class="lumen-image">
                <div class="lumen-glow"></div>
            </div>
        </div>
    </main>

</body>
</html>
